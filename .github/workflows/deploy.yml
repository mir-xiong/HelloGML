name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Inject environment variables
        run: |
          SIGN_SECRET="${SIGN_SECRET:-8a1317a7468aa3ad86e997d08f3f31cb}"
          sed -i "s|SIGN_SECRET = \"\"|SIGN_SECRET = \"${SIGN_SECRET}\"|" wrangler.toml
          sed -i "s|ADMIN_KEY = \"\"|ADMIN_KEY = \"${ADMIN_KEY}\"|" wrangler.toml
        env:
          SIGN_SECRET: ${{ vars.SIGN_SECRET }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}

      - name: Ensure KV namespace exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: bash .github/scripts/ensure-kv.sh

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
