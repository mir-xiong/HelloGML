name = "glm-free-api-worker"
main = "src/index.ts"
compatibility_date = "2024-05-12"

[vars]
# 智谱请求签名密钥（CI 中从 GitHub Variables 注入，默认值: 8a1317a7468aa3ad86e997d08f3f31cb）
SIGN_SECRET = ""

# 管理接口保护密钥（CI 中从 GitHub Secrets 注入）
ADMIN_KEY = ""

# KV Namespace 绑定，用于存储 api_key -> refresh_token 映射
# 首次部署前需执行：npx wrangler kv:namespace create "GLM_TOKENS"
# 然后将输出的 id 填入下方
[[kv_namespaces]]
binding = "GLM_TOKENS"
id = ""  # <-- 替换为你创建 KV 后得到的 id
